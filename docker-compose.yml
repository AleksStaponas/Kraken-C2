name: kraken-backend

services:

  app:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: kraken-api
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345678
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/kraken
    restart: unless-stopped

  java-shell:
    build:
      context: ./cli
      dockerfile: Dockerfile
    container_name: kraken-cli
    stdin_open: true
    tty: true
    depends_on:
      - app
      - postgres
      - mongo

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongo:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data: